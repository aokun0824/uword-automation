name: ユーワード自動投稿

on:
  schedule:
    # 毎時0分に実行。各会員のschedule.timesと照合して該当者のみ投稿
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "スケジュール無視で全会員を投稿（手動テスト用）"
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Playwright (Chromium) をインストール
        run: playwright install chromium --with-deps

      - name: 全会員を一括投稿（スケジュール照合）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python uword_poster.py --run-all --force
          else
            python uword_poster.py --run-all
          fi

      - name: スクリーンショットをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            error_screenshot.png
            after_click.png
            after_submit.png
          if-no-files-found: ignore

      - name: 履歴ファイルをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history_*.txt users/*.yaml
          git diff --cached --quiet || git commit -m "chore: 投稿履歴を更新 [$(date '+%Y-%m-%d %H:%M JST')]"
          git push
