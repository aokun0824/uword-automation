name: ユーワード自動投稿

on:
  schedule:
    # UTC 00:00 = JST 09:00
    # UTC 12:00 = JST 21:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:  # 手動実行でのテストにも対応

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Playwright (Chromium) をインストール
        run: playwright install chromium --with-deps

      # ===== 会員ごとの投稿処理 =====
      # 新しい会員を追加する場合は、このブロックをコピーして追加してください

      - name: 投稿 - EGAO Works（えがおワークス）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UWORD_ID_EGAOWORKS: ${{ secrets.UWORD_ID_EGAOWORKS }}
          UWORD_PW_EGAOWORKS: ${{ secrets.UWORD_PW_EGAOWORKS }}
        run: python uword_poster.py --config users/egao-works.yaml

      # 会員追加例（コメントアウト）:
      # - name: 投稿 - 〇〇サロン
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     UWORD_ID_XXXSALON: ${{ secrets.UWORD_ID_XXXSALON }}
      #     UWORD_PW_XXXSALON: ${{ secrets.UWORD_PW_XXXSALON }}
      #   run: python uword_poster.py --config users/xxx-salon.yaml

      # ===== 共通後処理 =====

      - name: スクリーンショットをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            error_screenshot.png
            after_click.png
            after_submit.png
          if-no-files-found: ignore

      - name: 履歴ファイルをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history_*.txt
          git diff --cached --quiet || git commit -m "chore: 投稿履歴を更新 [$(date '+%Y-%m-%d %H:%M JST')]"
          git push
