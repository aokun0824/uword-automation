name: ユーワード自動投稿

on:
  schedule:
    # UTC 00:00 = JST 09:00
    # UTC 12:00 = JST 21:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:  # 手動実行でのテストにも対応

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を強制使用（警告解消）
    permissions:
      contents: write   # history.txt のコミット・プッシュに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 設定ファイルの確認
        run: |
          if [ ! -f config.yaml ]; then
            echo "ERROR: config.yaml が見つかりません"
            exit 1
          fi
          echo "config.yaml を確認しました"

      - name: Playwright (Chromium) をインストール
        run: playwright install chromium --with-deps

      - name: 投稿スクリプトを実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UWORD_ID: ${{ secrets.UWORD_ID }}
          UWORD_PW: ${{ secrets.UWORD_PW }}
        run: python uword_poster.py

      - name: スクリーンショットをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            error_screenshot.png
            after_click.png
            after_submit.png
          if-no-files-found: ignore

      - name: history.txt をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          # 変更がない場合はスキップ
          git diff --cached --quiet || git commit -m "chore: 投稿履歴を更新 [$(date '+%Y-%m-%d %H:%M JST')]"
          git push
