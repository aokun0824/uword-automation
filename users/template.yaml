# 新規会員用テンプレート
# このファイルをコピーして会員名.yaml にリネームしてください
# 例: cp template.yaml tanaka-salon.yaml
# GitHub Secrets に UWORD_ID_{会員名大文字} / UWORD_PW_{会員名大文字} を登録してください

profile:
  name: "店舗名・サービス名"           # 例: "〇〇サロン"
  description: "サービスの説明"         # 例: "リラクゼーションサロンで〜〜を提供しています"
  cta: "お気軽にご相談ください"         # 投稿末尾の誘導文

uword:
  user_path: "ここにユーザーパスを入力"  # ユーワードのURLに含まれる固有パス

secrets:
  id_env: "UWORD_ID_YOURNAME"          # GitHub Secrets のキー名（大文字推奨）
  pw_env: "UWORD_PW_YOURNAME"

schedule:
  times: ["09:00", "21:00"]            # JST（投稿する時刻。複数指定可）
  timezone: "Asia/Tokyo"

post:
  title_max: 50
  body_max: 500
  history_max: 10
  prefix: "【この投稿はAIで自動投稿しています】\n"

rss:
  feeds:
    # 業種に合わせてRSSフィードを変更してください
    - "https://news.google.com/rss/search?q=AI+人工知能&hl=ja&gl=JP&ceid=JP:ja"
    # 例: 美容系
    # - "https://news.google.com/rss/search?q=美容+トレンド&hl=ja&gl=JP&ceid=JP:ja"
    # 例: 飲食系
    # - "https://news.google.com/rss/search?q=グルメ+飲食&hl=ja&gl=JP&ceid=JP:ja"

ai:
  model: "claude-haiku-4-5"
  max_tokens: 500

prompt:
  tone:
    - "友達に話しかけるような、自然でやわらかい口語調で書く"
    - "話題のキーワードを使って共感を引き出す"
    - "安心できる言葉を入れる"
    - "最後は自然な誘導で締める"
    - "「速報」「リアルタイム」のような仰々しい言葉は使わない"
    - "URLやハッシュタグは不要"
    - "過去投稿との重複を避ける"
