profile:
  name: 【関内】厳選黒毛和牛と本格韓国料理を愉しむお店「濱や本館」
  description: こだわりは、独自のルートで仕入れる鮮度抜群の国産黒毛和牛。肉本来の旨味を引き出すカットと、お酒が進む本場の韓国料理が自慢です。一度食べれば虜になる「てっぱんメニュー」を多数ご用意。キムチ、焼肉のタレ、厳選和牛など様々なメニューを用意しています。
  cta: 濱や自慢の味をぜひお試しください！
