{% extends "base.html" %}
{% block title %}投稿履歴 — {{ slug }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('member_edit', slug=slug) }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0"><i class="bi bi-clock-history me-2 text-primary"></i>投稿履歴 — {{ slug }}</h4>
</div>

<div class="card">
  <div class="card-body p-0">
    {% if entries %}
    <ul class="list-group list-group-flush">
      {% for entry in entries | reverse %}
      <li class="list-group-item px-4 py-3">
        <span class="text-muted small" style="font-family:monospace">{{ loop.index }}</span>
        <span class="ms-2">{{ entry }}</span>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <div class="text-center py-5 text-muted">
      <i class="bi bi-inbox" style="font-size:3rem"></i>
      <p class="mt-3">まだ投稿履歴がありません</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
